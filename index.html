<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#58cc02">
  <title>BioQuest · SE Biologie spelend leren</title>
  <meta name="description" content="Leer de SE-stof biologie (zenuwstelsel, waarnemen, afweer) spelend: een levelpad, quizzen, flashcards, proces-puzzels en een AI-tutor.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand">
      <span class="logo">🧬</span>
      <span class="brand-txt">BioQuest</span>
    </div>
    <div class="spacer"></div>
    <div class="hud">
      <div class="chip-stat streak" id="streakChip" title="Dagelijkse streak">
        <span class="ic">🔥</span><b id="streakVal">0</b>
      </div>
      <div class="chip-stat xp" id="xpChip" title="Level & XP">
        <span class="lvlring" id="lvlRing"><i id="lvlBadge">1</i></span>
        <span class="xpcol">
          <span class="xpnum" id="xpText">0 XP</span>
          <span class="xpbar"><span id="xpFill"></span></span>
        </span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Instellingen">⚙️</button>
    </div>
  </header>

  <main id="app"></main>

  <!-- mascotte "Neo" (origineel, in Duolingo-stijl) -->
  <button class="mascot" id="mascot" title="Hoi! Klik me 👋" aria-label="Mascotte">
    <svg viewBox="0 0 120 120" width="62" height="62">
      <defs>
        <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7ee04a"/><stop offset="100%" stop-color="#58cc02"/>
        </linearGradient>
      </defs>
      <g class="mbody">
        <ellipse cx="60" cy="64" rx="42" ry="44" fill="url(#mg)" stroke="#46a302" stroke-width="3"/>
        <!-- buikje -->
        <ellipse cx="60" cy="74" rx="26" ry="28" fill="#d7ffb8"/>
        <!-- oogjes -->
        <g class="meyes">
          <circle cx="47" cy="52" r="13" fill="#fff" stroke="#46a302" stroke-width="2"/>
          <circle cx="73" cy="52" r="13" fill="#fff" stroke="#46a302" stroke-width="2"/>
          <circle cx="49" cy="54" r="5.5" fill="#3c3c3c"/>
          <circle cx="71" cy="54" r="5.5" fill="#3c3c3c"/>
          <circle cx="51" cy="52" r="1.8" fill="#fff"/>
          <circle cx="73" cy="52" r="1.8" fill="#fff"/>
        </g>
        <!-- snaveltje -->
        <path d="M54 64 h12 l-6 7 z" fill="#ffc800" stroke="#e6a800" stroke-width="1.5"/>
        <!-- blosjes -->
        <circle cx="38" cy="66" r="4.5" fill="#ff9bb3" opacity=".6"/>
        <circle cx="82" cy="66" r="4.5" fill="#ff9bb3" opacity=".6"/>
        <!-- oortjes/veertjes -->
        <path d="M40 24 q4 -12 12 -6" fill="none" stroke="#46a302" stroke-width="4" stroke-linecap="round"/>
        <path d="M80 24 q-4 -12 -12 -6" fill="none" stroke="#46a302" stroke-width="4" stroke-linecap="round"/>
      </g>
    </svg>
  </button>

  <canvas id="confetti"></canvas>
  <div class="toast" id="toast"></div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
