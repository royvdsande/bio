<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#58cc02">
  <title>BioQuest · Biologie HAVO & VWO leren en oefenen</title>
  <meta name="description" content="Biologie voor HAVO en VWO (Biologie voor Jou & Nectar): samengevatte theorie, flitskaarten, oefenvragen en échte examenopgaven met antwoordmodel. Speels leren met optionele AI-uitleg en feedback.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><g fill='none' stroke-width='2' stroke-linecap='round'><path d='M7 3c0 5 10 5 10 10s-10 5-10 10' stroke='%2358cc02'/><path d='M17 3c0 5-10 5-10 10s10 5 10 10' stroke='%231cb0f6'/><path d='M8.4 6h7.2M8.4 18h7.2M6.6 9.5h10.8M6.6 14.5h10.8' stroke='%23ce82ff' stroke-width='1.6'/></g></svg>">
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand" role="button" tabindex="0" aria-label="Naar startscherm">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="26" height="26">
          <g fill="none" stroke-width="2" stroke-linecap="round">
            <path d="M7 3c0 5 10 5 10 10s-10 5-10 10" stroke="#58cc02"/>
            <path d="M17 3c0 5-10 5-10 10s10 5 10 10" stroke="#1cb0f6"/>
            <path d="M8.4 6h7.2M8.4 18h7.2M6.6 9.5h10.8M6.6 14.5h10.8" stroke="#ce82ff" stroke-width="1.6"/>
          </g>
        </svg>
      </span>
      <span class="brand-txt">BioQuest</span>
    </div>
    <div class="spacer"></div>
    <div class="hud" id="hud">
      <div class="chip-stat streak" id="streakChip" title="Dagelijkse streak" aria-label="Dagelijkse streak">
        <svg class="ic ic-flame" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path class="flame-out" d="M12 23c4.4 0 7.5-3 7.5-7.2 0-2.9-1.6-5.2-3.1-7-.5 1.1-1.3 1.8-2.2 1.9.8-2.3.3-4.8-2.1-7.4-.3 2.3-1.6 3.7-3 5.2C7.2 10.1 6 12.3 6 15.8 6 20 7.6 23 12 23z"/>
          <path class="flame-in" d="M12 22c2.4 0 4-1.7 4-3.9 0-1.8-1.1-3-2.2-4.2-.4 1.4-1.2 1.8-1.9 1.9.5-1.6-.4-3-1.6-4-.2 1.6-1 2.3-1.6 3.2-.5.8-1 1.7-1 3 0 2.3 1.9 4 4.3 4z"/>
        </svg><b id="streakVal">0</b>
      </div>
      <div class="chip-stat xp" id="xpChip" title="Level & XP">
        <span class="lvlring" id="lvlRing"><i id="lvlBadge">1</i></span>
        <span class="xpcol">
          <span class="xpnum" id="xpText">0 XP</span>
          <span class="xpbar"><span id="xpFill"></span></span>
        </span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Instellingen" aria-label="Instellingen">
        <svg class="ic ic-gear" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1l-.4-2.6H10.9l-.4 2.6a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7.8 7.8 0 0 0 0 2l-2 1.6 2 3.4 2.4-1c.5.4 1.1.7 1.7 1l.4 2.6h4.2l.4-2.6c.6-.3 1.2-.6 1.7-1l2.4 1 2-3.4-2-1.6zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="app"></main>

  <!-- mascotte "Neo" (origineel, in Duolingo-stijl) -->
  <button class="mascot" id="mascot" title="Hoi! Klik me 👋" aria-label="Mascotte">
    <svg viewBox="0 0 120 120" width="62" height="62">
      <defs>
        <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7ee04a"/><stop offset="100%" stop-color="#58cc02"/>
        </linearGradient>
      </defs>
      <g class="mbody">
        <ellipse cx="60" cy="64" rx="42" ry="44" fill="url(#mg)" stroke="#46a302" stroke-width="3"/>
        <!-- buikje -->
        <ellipse cx="60" cy="74" rx="26" ry="28" fill="#d7ffb8"/>
        <!-- oogjes -->
        <g class="meyes">
          <circle cx="47" cy="52" r="13" fill="#fff" stroke="#46a302" stroke-width="2"/>
          <circle cx="73" cy="52" r="13" fill="#fff" stroke="#46a302" stroke-width="2"/>
          <circle cx="49" cy="54" r="5.5" fill="#3c3c3c"/>
          <circle cx="71" cy="54" r="5.5" fill="#3c3c3c"/>
          <circle cx="51" cy="52" r="1.8" fill="#fff"/>
          <circle cx="73" cy="52" r="1.8" fill="#fff"/>
        </g>
        <!-- snaveltje -->
        <path d="M54 64 h12 l-6 7 z" fill="#ffc800" stroke="#e6a800" stroke-width="1.5"/>
        <!-- blosjes -->
        <circle cx="38" cy="66" r="4.5" fill="#ff9bb3" opacity=".6"/>
        <circle cx="82" cy="66" r="4.5" fill="#ff9bb3" opacity=".6"/>
        <!-- oortjes/veertjes -->
        <path d="M40 24 q4 -12 12 -6" fill="none" stroke="#46a302" stroke-width="4" stroke-linecap="round"/>
        <path d="M80 24 q-4 -12 -12 -6" fill="none" stroke="#46a302" stroke-width="4" stroke-linecap="round"/>
      </g>
    </svg>
  </button>

  <canvas id="confetti"></canvas>
  <div class="toast" id="toast"></div>

  <script src="content.js"></script>
  <script src="nectar-videos.js"></script>
  <script src="app.js"></script>
</body>
</html>
